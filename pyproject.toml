[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line-too-long — enforced by formatter instead
    "B006",  # mutable default args — not present here, but preemptive
    "SIM108", # ternary suggestion — sometimes hurts readability
]

[tool.ruff.lint.isort]
known-first-party = ["ruconceptnet"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"


[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"


[tool.coverage.run]
source = ["ruconceptnet", "compressor"]
omit = [
    "*/tests/*",
    "setup.py",
    "example.py",
]

[tool.coverage.report]
show_missing = true
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
